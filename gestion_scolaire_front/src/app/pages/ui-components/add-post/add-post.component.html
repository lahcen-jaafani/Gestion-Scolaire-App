<mat-card class="cardWithShadow theme-card add-post-card">
  <mat-card-header>
    <mat-card-title>
      <mat-icon class="mr-2">post_add</mat-icon>
      Créer un post
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" enctype="multipart/form-data" class="post-form">

      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Titre</mat-label>
          <input matInput formControlName="titre" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Type</mat-label>
          <mat-select formControlName="type">
            <mat-option *ngFor="let t of postTypes" [value]="t.value">{{ t.label }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field class="full-width" appearance="outline">
          <mat-label>Contenu</mat-label>
          <textarea matInput formControlName="contenu" rows="4"></textarea>
        </mat-form-field>
      </div>

      <div class="file-input">
        <input type="file" id="fileUpload" (change)="onFileChange($event)" accept="image/*" hidden />
        <button mat-stroked-button color="accent" (click)="triggerFileInput()" type="button">
          <mat-icon>upload</mat-icon> Choisir une image
        </button>
        <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
      </div>

      <div class="submit-container">
        <button mat-flat-button color="primary" [disabled]="form.invalid">
          <mat-icon>send</mat-icon> Publier
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
