<mat-card class="cardWithShadow theme-card add-post-card p-4">
    <mat-card-header>
        <mat-card-title>
            <span style="color: #1976d2; font-size: 24px; font-weight: bold;">
                <mat-icon class="mr-2" style="vertical-align: middle;">apartment</mat-icon>
                Créer un Département
            </span>
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()" enctype="multipart/form-data" class="post-form">

            <!-- Nom de Département -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Nom de Département</mat-label>
                <mat-icon matPrefix color="primary">badge</mat-icon>
                <input matInput formControlName="departementName" />
            </mat-form-field>

            <!-- Chef de département -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Chef de département</mat-label>
                <mat-icon matPrefix color="primary">supervisor_account</mat-icon>
                <mat-select formControlName="chef">
                    <mat-option *ngFor="let prof of professors" [value]="prof.id">
                        {{ prof.firstName }} {{ prof.lastName }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <!-- Upload Image -->
            <div class="full-width mb-3">
                <label style="font-weight: 500; display: flex; align-items: center; color: #1976d2;">
                    <mat-icon class="mr-2">image</mat-icon>
                    Image du département
                </label>
                <input type="file" (change)="onFileChange($event)" accept="image/*" style="margin-top: 8px;" />
            </div>
              

            <!-- Submit -->
            <button mat-flat-button color="primary" [disabled]="form.invalid" class="mt-2">
                <mat-icon>send</mat-icon>&nbsp;Publier
            </button>
        </form>
    </mat-card-content>
</mat-card>
