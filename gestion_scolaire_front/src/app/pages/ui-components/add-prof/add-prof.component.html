<div class="page-wrapper">
  <div class="form-header">
    <div class="header-content">
      <h1><mat-icon>school</mat-icon> Gestion des Professeurs</h1>
      <p>Ajoutez un nouveau professeur avec accès à l’espace pédagogique de la plateforme ING School.</p>
    </div>
  </div>

  <mat-card class="form-container full-width">
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-content">

      <div class="row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label><mat-icon>person</mat-icon> Prénom</mat-label>
          <input matInput formControlName="firstName" placeholder="Prénom">
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label><mat-icon>person</mat-icon> Nom</mat-label>
          <input matInput formControlName="lastName" placeholder="Nom">
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label><mat-icon>email</mat-icon> Email</mat-label>
          <input matInput formControlName="email" placeholder="exemple@admin.com">
        </mat-form-field>
      </div>

      <div class="row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label><mat-icon>lock</mat-icon> Mot de passe</mat-label>
          <input matInput type="password" formControlName="password" placeholder="Minimum 8 caractères">
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label><mat-icon>verified_user</mat-icon> Rôle</mat-label>
          <input matInput formControlName="role" readonly>
        </mat-form-field>
      </div>

      <div class="btn-container">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          <mat-icon>person_add</mat-icon> Ajouter
        </button>
      </div>
    </form>
  </mat-card>
</div>
