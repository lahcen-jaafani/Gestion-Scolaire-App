<div class="flex items-center justify-center min-h-screen bg-gradient-to-r from-indigo-500 via-blue-500 to-cyan-500 px-4">
  <mat-card class="w-full max-w-md p-8 shadow-2xl rounded-2xl bg-white animate-fade-in">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="bg-blue-100 p-4 rounded-full inline-flex mb-3">
        <mat-icon class="text-blue-600 text-4xl">lock_reset</mat-icon>
      </div>
      <h2 class="text-2xl font-extrabold text-gray-800">Mot de passe oublié</h2>
      <p class="text-sm text-gray-500 mt-1">
        Entrez votre adresse e-mail pour recevoir un lien de réinitialisation
      </p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <!-- Email -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="exemple@email.com" />
        <mat-icon matSuffix class="text-gray-400">mail</mat-icon>

      </mat-form-field>

      <!-- Submit Button -->
      <button mat-flat-button color="primary" type="submit"
              class="w-full py-2 rounded-lg text-white font-semibold shadow-md hover:shadow-lg transition">
        <mat-icon>send</mat-icon>
        Envoyer le lien de réinitialisation
      </button>

      <!-- Back Link -->
      <div class="text-center mt-4">
        <a [routerLink]="['/login']" class="text-sm text-indigo-600 hover:text-indigo-800 transition">
          <mat-icon class="text-base mr-1">arrow_back</mat-icon>
          Retour à la connexion
        </a>
      </div>
    </form>
  </mat-card>
</div>
