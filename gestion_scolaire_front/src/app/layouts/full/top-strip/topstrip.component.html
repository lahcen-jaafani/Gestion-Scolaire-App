<div class="app-topstrip px-6 py-3 w-full flex flex-wrap justify-between items-center gap-4 bg-gradient-to-r from-indigo-900 to-purple-900 shadow-lg">
  <!-- Partie gauche -->
  <div class="flex flex-wrap items-center gap-6 text-white">
    <!-- Logo (optionnel) -->
    <div class="flex items-center mr-4">
      <mat-icon class="text-2xl mr-2">school</mat-icon>
      <span class="font-bold text-xl hidden md:block">ENSA KHOURIBGA</span>
    </div>

    <!-- Menu Formation -->
    <div class="relative group">
      <button mat-button class="flex items-center gap-1 hover:bg-white/10 rounded-lg px-3 py-2 transition-all duration-200">
        <mat-icon>school</mat-icon>
        <span>FORMATION</span>
        <mat-icon class="transform group-hover:rotate-180 transition-transform">arrow_drop_down</mat-icon>
      </button>
      <div class="absolute left-0 mt-1 w-56 bg-white rounded-md shadow-lg z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
        <div *ngFor="let item of items" (click)="navigateToMajor(item)"
             class="px-4 py-3 text-gray-800 hover:bg-indigo-50 cursor-pointer flex items-center gap-2">
          <mat-icon class="text-indigo-600">school</mat-icon>
          <span>{{ item.name }}</span>
        </div>
      </div>
    </div>

    <!-- Autres liens -->
    <a mat-button routerLink="/ui-components/departments"
       class="flex items-center gap-1 hover:bg-white/10 rounded-lg px-3 py-2 transition-all duration-200">
      <mat-icon>domain</mat-icon>
      <span>DÉPARTEMENTS</span>
    </a>

    <a mat-button routerLink="/ui-components/library"
       class="flex items-center gap-1 hover:bg-white/10 rounded-lg px-3 py-2 transition-all duration-200">
      <mat-icon>local_library</mat-icon>
      <span>BIBLIOTHÈQUE</span>
    </a>

    <a mat-button routerLink="/ui-components/contact"
       class="flex items-center gap-1 hover:bg-white/10 rounded-lg px-3 py-2 transition-all duration-200">
      <mat-icon>contact_mail</mat-icon>
      <span>CONTACT</span>
    </a>
  </div>

  <!-- Partie droite -->
  <div class="flex flex-wrap items-center gap-4 text-white">
    <!-- Contacts -->
    <div class="hidden md:flex items-center gap-4">
      <a mat-button class="flex items-center gap-2 hover:bg-white/10 rounded-full px-3 py-1 transition-all duration-200">
        <mat-icon class="text-blue-300">phone</mat-icon>
        <span>+212 5XX XXX XXX</span>
      </a>

      <a mat-button class="flex items-center gap-2 hover:bg-white/10 rounded-full px-3 py-1 transition-all duration-200">
        <mat-icon class="text-green-300">email</mat-icon>
        <span class="hover:underline">ensa&usms.ac.ma</span>
      </a>
    </div>

    <!-- Espaces -->
    <div class="flex items-center gap-2 border-l border-white/20 pl-4">
      <a *ngIf="!isAuthenticated" mat-button routerLink="/ui-components/login"
         class="flex items-center gap-1 bg-white/10 hover:bg-white/20 rounded-full px-4 py-1 transition-all duration-200">
        <mat-icon>person</mat-icon>
        <span class="hidden sm:inline">ESPACE ÉTUDIANT</span>
      </a>

      <a *ngIf="!isAuthenticated" mat-button routerLink="/ui-components/login"
         class="flex items-center gap-1 bg-purple-500 hover:bg-purple-600 rounded-full px-4 py-1 transition-all duration-200">
        <mat-icon>school</mat-icon>
        <span class="hidden sm:inline">ESPACE ENSEIGNANT</span>
      </a>

      <div *ngIf="isAuthenticated" class="flex items-center gap-3">
        <div class="flex items-center gap-2 bg-white/10 rounded-full px-4 py-1">
          <mat-icon>person</mat-icon>
          <span class="font-medium">{{ userFullName }}</span>
        </div>
        <button *ngIf="isAuthenticated" mat-icon-button matTooltip="Se déconnecter" (click)="logout()"
                class="hover:bg-white/20 rounded-full transition-all duration-200">
          <mat-icon class="text-red-300 hover:text-red-100">logout</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
