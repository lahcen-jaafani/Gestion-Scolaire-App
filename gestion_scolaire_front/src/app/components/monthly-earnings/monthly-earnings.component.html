<mat-card class="stats-card">
  <mat-card-header class="card-header">
    <mat-card-title class="stats-title">
      <mat-icon class="stats-icon">school</mat-icon>
      Répartition Départements/Filières
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="card-content">
    <div class="stats-grid">
      <!-- Bloc Départements -->
      <div class="stat-block department-block">
        <div class="stat-icon-wrapper">
          <mat-icon class="stat-icon">account_balance</mat-icon>
        </div>
        <div class="stat-value">{{stats.departements || 0}}</div>
        <div class="stat-label">Départements</div>
      </div>

      <!-- Séparateur -->
      <div class="stat-separator"></div>

      <!-- Bloc Filières -->
      <div class="stat-block filiere-block">
        <div class="stat-icon-wrapper">
          <mat-icon class="stat-icon">class</mat-icon>
        </div>
        <div class="stat-value">{{stats.majors || 0}}</div>
        <div class="stat-label">Filières</div>
      </div>

      <!-- Graphique -->

    </div>
  </mat-card-content>
</mat-card>
<style>
  /* Styles SCSS améliorés */
  .stats-card {
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    overflow: hidden;
    border: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;

    &:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
    }

    .card-header {
      padding: 20px 24px 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
    }

    .stats-title {
      font-size: 1.25rem;
      font-weight: 500;
      color: #2c3e50;
      display: flex;
      align-items: center;
      margin-bottom: 0;

      .stats-icon {
        margin-right: 12px;
        color: #3f51b5;
      }
    }

    .card-content {
      padding: 16px 24px 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 8px 1fr;
      gap: 16px;
      align-items: center;

      @media (max-width: 600px) {
        grid-template-columns: 1fr;
        grid-template-rows: auto 8px auto;
      }
    }

    .stat-block {
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      transition: all 0.3s ease;

      &:hover {
        transform: scale(1.02);
      }

      .stat-icon-wrapper {
        width: 48px;
        height: 48px;
        margin: 0 auto 12px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stat-icon {
        font-size: 24px;
      }

      .stat-value {
        font-size: 2.2rem;
        font-weight: 600;
        line-height: 1;
        margin-bottom: 8px;
      }

      .stat-label {
        font-size: 0.9rem;
        color: #666;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      &.department-block {
        .stat-icon-wrapper {
          background-color: rgba(63, 81, 181, 0.1);
        }
        .stat-icon {
          color: #3f51b5;
        }
        .stat-value {
          color: #3f51b5;
        }
      }

      &.filiere-block {
        .stat-icon-wrapper {
          background-color: rgba(76, 175, 80, 0.1);
        }
        .stat-icon {
          color: #4caf50;
        }
        .stat-value {
          color: #4caf50;
        }
      }
    }

    .stat-separator {
      height: 100%;
      background: linear-gradient(to bottom, transparent, #e0e0e0, transparent);
      width: 1px;
      margin: 0 auto;

      @media (max-width: 600px) {
        height: 1px;
        width: 80%;
        background: linear-gradient(to right, transparent, #e0e0e0, transparent);
      }
    }

    .chart-container {
      grid-column: span 3;
      margin-top: 16px;

      @media (max-width: 600px) {
        grid-column: span 1;
      }
    }
  }
</style>
